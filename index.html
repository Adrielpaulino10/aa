<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Proyectos - Adriel Paulino</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 40px;
        }

        .projects {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .project-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .project-card h2 {
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .project-card p {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .emoji {
            font-size: 2em;
            display: block;
            margin-bottom: 10px;
        }

        .footer {
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 2em;
            }

            .projects {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Mis Proyectos</h1>
        <p class="subtitle">Bienvenido a mis aplicaciones HTML</p>

        <div class="projects">
            <a href="tienda.html" class="project-card">
                <span class="emoji">📊</span>
                <h2>Sistema de Tienda</h2>
                <p>Gestión completa de inventario, transacciones y estadísticas</p>
            </a>

            <a href="responsive.html" class="project-card">
                <span class="emoji">📱</span>
                <h2>Diseño Responsivo</h2>
                <p>Interfaz adaptable para móviles y escritorio</p>
            </a>
        </div>

        <div class="footer">
            <p>© 2026 - Adriel Paulino | Desarrollado con HTML, CSS y JavaScript</p>
        </div>
    </div>
</body>
</html>
