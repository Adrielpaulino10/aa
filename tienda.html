<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Completo - Tienda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header h1:hover {
            transform: scale(1.05);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            background: white;
            border: 2px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: all 0.3s ease;
            color: #667eea;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #764ba2;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ESTADÍSTICAS */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .card h3 {
            color: #667eea;
            font-size: 0.9em;
            text-transform: uppercase;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .card h3:hover {
            color: #764ba2;
        }

        .card .value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }

        .card.success .value { color: #27ae60; }
        .card.warning .value { color: #e74c3c; }
        .card.info .value { color: #3498db; }

        .comparison-section {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .month-data {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .month-data h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .variation {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            grid-column: 1 / -1;
        }

        .variation-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
            color: #2ecc71;
        }

        .variation-value.negative {
            color: #e74c3c;
        }

        .transactions-section {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
              max-width: 800px;  
             margin-left: auto;
            margin-right: auto;    
             overflow-x: auto; 
              
         }
table {
        min-width: 600px;
        font-size: 0.9em;
    }
        .form-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
.form-group {
        overflow-x: auto;      
        display: flex;         
        gap: 15px;            
    }
        .form-group label {
            display: block;
            color: #333;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn.secondary {
            background: #ddd;
            color: #333;
        }

        .btn.secondary:hover {
            background: #bbb;
        }

        .btn.danger {
            background: #e74c3c;
        }

        .btn.danger:hover {
            background: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }

        table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
        }

        table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .badge.venta { background: #d4edda; color: #155724; }
        .badge.gasto { background: #f8d7da; color: #721c24; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-buttons .btn-save {
            background: #27ae60;
            color: white;
        }

        .modal-buttons .btn-cancel {
            background: #ddd;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 5px 10px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .comparison-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
        table {
        font-size: 0.85em;      
        width: 100%;
        overflow-x: auto;     
    }
    
    table th,
    table td {
        padding: 8px;          
    }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 onclick="editTitle()">📊 Sistema Completo de Tienda</h1>
        </div>

        <!-- TABS -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('estadisticas')">📊 Estadísticas</button>
            <button class="tab-btn" onclick="switchTab('inventario')">📦 Inventario</button>
            <button class="tab-btn" onclick="switchTab('transacciones')">💳 Transacciones</button>
            <button class="tab-btn" onclick="switchTab('configuracion')">⚙️ Configuración</button>
        </div>

        <!-- TAB: ESTADÍSTICAS -->
        <div class="tab-content active" id="tab-estadisticas">
            <div class="dashboard" id="dashboard"></div>
            
            <div class="comparison-section">
                <h2>📊 Comparación Mensual</h2>
                <div class="comparison-grid" id="comparison-grid"></div>
            </div>
        </div>

        <!-- TAB: INVENTARIO -->
        <div class="tab-content" id="tab-inventario">
            <div class="transactions-section">
                <h2>📦 Gestión de Inventario</h2>
                <div class="controls">
                    <input type="text" id="searchProduct" placeholder="Buscar producto..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
                    <button class="btn" onclick="toggleProductForm()">+ Nuevo Producto</button>
                </div>

                <div id="productFormContainer" style="display: none; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                    <h3>Agregar/Editar Producto</h3>
                    <div class="form-group">
                        <div>
                            <label>Nombre:</label>
                            <input type="text" id="prodName" placeholder="Nombre del producto">
                        </div>
                        <div>
                            <label>Precio:</label>
                            <input type="number" id="prodPrice" placeholder="0.00" step="0.01" min="0">
                        </div>
                        <div>
                            <label>Cantidad:</label>
                            <input type="number" id="prodQty" placeholder="0" step="1" min="0">
                        </div>
                    </div>
                    <div class="form-group">
                        <div>
                            <label>Descripción:</label>
                            <textarea id="prodDesc" placeholder="Descripción del producto" rows="3"></textarea>
                        </div>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn" onclick="saveProduct()">Guardar Producto</button>
                        <button class="btn secondary" onclick="toggleProductForm()">Cancelar</button>
                    </div>
                </div>

                <table id="productsTable">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Descripción</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="productsBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB: TRANSACCIONES -->
        <div class="tab-content" id="tab-transacciones">
            <div class="transactions-section">
                <h2>💳 Agregar Transacción</h2>
                <div class="form-group">
                    <div>
                        <label for="fecha">Fecha:</label>
                        <input type="date" id="fecha">
                    </div>
                    <div>
                        <label for="monto">Monto:</label>
                        <input type="number" id="monto" placeholder="0.00" step="0.01" min="0">
                    </div>
                    <div>
                        <label for="tipo">Tipo:</label>
                        <select id="tipo">
                            <option value="venta">Venta</option>
                            <option value="gasto">Gasto</option>
                        </select>
                    </div>
                    <div>
                        <label for="descripcion">Descripción:</label>
                        <input type="text" id="descripcion" placeholder="Ej: Venta de productos">
                    </div>
                </div>
                <button class="btn" onclick="agregarTransaccion()">Agregar Transacción</button>

                <h2 style="margin-top: 30px;">📋 Últimas Transacciones</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Tipo</th>
                            <th>Monto</th>
                            <th>Descripción</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="transacciones-body">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- TAB: CONFIGURACIÓN -->
        <div class="tab-content" id="tab-configuracion">
            <div class="transactions-section">
                <h2>⚙️ Configuración</h2>
                <div class="controls">
                    <button class="btn" onclick="guardarDatos()">💾 Guardar Datos</button>
                    <button class="btn" onclick="exportarJSON()">📤 Exportar JSON</button>
                    <button class="btn" onclick="importarJSON()">📥 Importar JSON</button>
                    <button class="btn danger" onclick="limpiarTodo()">🗑️ Limpiar Todo</button>
                </div>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>
        </div>
    </div>

    <!-- Modal de Edición -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2>Editar Campo</h2>
            <input type="text" id="editValue" placeholder="Nuevo valor">
            <div class="modal-buttons">
                <button class="btn-save" onclick="guardarEdicion()" style="background: #27ae60; color: white; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer;">Guardar</button>
                <button class="btn-cancel" onclick="cerrarModal()" style="background: #ddd; color: #333; padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // ===== VARIABLES GLOBALES =====
        let titulo = "📊 Sistema Completo de Tienda";
        let transacciones = [];
        let productos = [];
        let editando = null;

        // ===== INICIALIZACIÓN =====
        document.addEventListener('DOMContentLoaded', () => {
            cargarDatos();
            setFechaActual();
            actualizarDashboard();
            renderizarProductos();
            renderizarTransacciones();
        });

        // ===== TABS =====
        function switchTab(tabName) {
            // Ocultar todos los tabs
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));

            // Mostrar tab seleccionado
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.target.classList.add('active');
        }

        // ===== ESTADÍSTICAS =====
        function calcularEstadisticas(mes, año) {
            const ahora = new Date();
            const mesActual = mes || ahora.getMonth() + 1;
            const añoActual = año || ahora.getFullYear();

            const filtrados = transacciones.filter(t => {
                const fecha = new Date(t.fecha);
                return fecha.getMonth() + 1 === mesActual && fecha.getFullYear() === añoActual;
            });

            const ingresos = filtrados
                .filter(t => t.tipo === 'venta')
                .reduce((sum, t) => sum + parseFloat(t.monto), 0);

            const egresos = filtrados
                .filter(t => t.tipo === 'gasto')
                .reduce((sum, t) => sum + parseFloat(t.monto), 0);

            return {
                ingresos: parseFloat(ingresos.toFixed(2)),
                egresos: parseFloat(egresos.toFixed(2)),
                ganancia: parseFloat((ingresos - egresos).toFixed(2)),
                transacciones: filtrados.length,
                promedio: filtrados.length > 0 ? parseFloat((ingresos / filtrados.length).toFixed(2)) : 0,
                mes: mesActual,
                año: añoActual
            };
        }

        function actualizarDashboard() {
            const stats = calcularEstadisticas();
            renderizarCards(stats);
            renderizarComparacion();
        }

        function renderizarCards(stats) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `
                <div class="card success">
                    <h3>💰 Total Ingresos</h3>
                    <div class="value">$${stats.ingresos.toFixed(2)}</div>
                </div>
                <div class="card warning">
                    <h3>📤 Total Egresos</h3>
                    <div class="value">$${stats.egresos.toFixed(2)}</div>
                </div>
                <div class="card success">
                    <h3>📈 Ganancia Neta</h3>
                    <div class="value">$${stats.ganancia.toFixed(2)}</div>
                </div>
                <div class="card info">
                    <h3>🔢 Transacciones</h3>
                    <div class="value">${stats.transacciones}</div>
                </div>
                <div class="card info">
                    <h3>📊 Promedio</h3>
                    <div class="value">$${stats.promedio.toFixed(2)}</div>
                </div>
                <div class="card info">
                    <h3>📅 Período</h3>
                    <div class="value">${String(stats.mes).padStart(2, '0')}/${stats.año}</div>
                </div>
            `;
        }

        function renderizarComparacion() {
            const ahora = new Date();
            const mesActual = ahora.getMonth() + 1;
            const añoActual = ahora.getFullYear();

            let mesAnterior = mesActual - 1;
            let añoAnterior = añoActual;
            if (mesAnterior === 0) {
                mesAnterior = 12;
                añoAnterior -= 1;
            }

            const statsActual = calcularEstadisticas(mesActual, añoActual);
            const statsAnterior = calcularEstadisticas(mesAnterior, añoAnterior);

            const variacion = statsActual.ingresos - statsAnterior.ingresos;
            const porcentaje = statsAnterior.ingresos > 0 
                ? ((variacion / statsAnterior.ingresos) * 100).toFixed(2)
                : 0;

            const grid = document.getElementById('comparison-grid');
            grid.innerHTML = `
                <div class="month-data">
                    <h3>${mesNombre(mesAnterior)} ${añoAnterior}</h3>
                    <p><strong>Ingresos:</strong> $${statsAnterior.ingresos.toFixed(2)}</p>
                    <p><strong>Egresos:</strong> $${statsAnterior.egresos.toFixed(2)}</p>
                    <p><strong>Ganancia:</strong> $${statsAnterior.ganancia.toFixed(2)}</p>
                    <p><strong>Transacciones:</strong> ${statsAnterior.transacciones}</p>
                </div>
                <div class="month-data">
                    <h3>${mesNombre(mesActual)} ${añoActual}</h3>
                    <p><strong>Ingresos:</strong> $${statsActual.ingresos.toFixed(2)}</p>
                    <p><strong>Egresos:</strong> $${statsActual.egresos.toFixed(2)}</p>
                    <p><strong>Ganancia:</strong> $${statsActual.ganancia.toFixed(2)}</p>
                    <p><strong>Transacciones:</strong> ${statsActual.transacciones}</p>
                </div>
                <div class="variation">
                    <h3>📈 Variación</h3>
                    <div class="variation-value ${variacion >= 0 ? '' : 'negative'}">
                        ${variacion >= 0 ? '↑ +' : '↓ -'}$${Math.abs(variacion).toFixed(2)}
                    </div>
                    <p><strong>${porcentaje}%</strong></p>
                    <p>${variacion >= 0 ? '✅ Tienda mejoró' : '⚠️ Tienda bajó'}</p>
                </div>
            `;
        }

        function mesNombre(mes) {
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                          'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            return meses[mes - 1];
        }

        // ===== TRANSACCIONES =====
        function agregarTransaccion() {
            const fecha = document.getElementById('fecha').value;
            const monto = document.getElementById('monto').value;
            const tipo = document.getElementById('tipo').value;
            const descripcion = document.getElementById('descripcion').value;

            if (!fecha || !monto) {
                alert('⚠️ Completa fecha y monto');
                return;
            }

            transacciones.push({
                fecha,
                monto: parseFloat(monto),
                tipo,
                descripcion
            });

            setFechaActual();
            document.getElementById('monto').value = '';
            document.getElementById('descripcion').value = '';
            actualizarDashboard();
            renderizarTransacciones();
            guardarDatos();
        }

        function renderizarTransacciones() {
            const tbody = document.getElementById('transacciones-body');
            tbody.innerHTML = '';

            if (transacciones.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Sin transacciones</td></tr>';
                return;
            }

            transacciones.slice().reverse().forEach((t, idx) => {
                const fecha = new Date(t.fecha).toLocaleDateString('es-ES');
                const indexReal = transacciones.length - 1 - idx;
                tbody.innerHTML += `
                    <tr>
                        <td>${fecha}</td>
                        <td><span class="badge ${t.tipo}">${t.tipo.toUpperCase()}</span></td>
                        <td>$${parseFloat(t.monto).toFixed(2)}</td>
                        <td>${t.descripcion}</td>
                        <td><button class="btn action-btn danger" onclick="eliminarTransaccion(${indexReal})">❌</button></td>
                    </tr>
                `;
            });
        }

        function eliminarTransaccion(index) {
            if (confirm('¿Eliminar transacción?')) {
                transacciones.splice(index, 1);
                actualizarDashboard();
                renderizarTransacciones();
                guardarDatos();
            }
        }

        // ===== PRODUCTOS =====
        function toggleProductForm() {
            const form = document.getElementById('productFormContainer');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
            if (form.style.display === 'block') {
                document.getElementById('prodName').focus();
            }
        }

        function saveProduct() {
            const name = document.getElementById('prodName').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value) || 0;
            const qty = parseInt(document.getElementById('prodQty').value) || 0;
            const desc = document.getElementById('prodDesc').value.trim();

            if (!name) {
                alert('⚠️ El nombre es requerido');
                return;
            }

            const producto = {
                id: Date.now(),
                nombre: name,
                precio: price,
                cantidad: qty,
                descripcion: desc
            };

            productos.push(producto);
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodQty').value = '';
            document.getElementById('prodDesc').value = '';
            document.getElementById('productFormContainer').style.display = 'none';
            renderizarProductos();
            guardarDatos();
            alert('✅ Producto guardado');
        }

        function renderizarProductos(filter = '') {
            const tbody = document.getElementById('productsBody');
            tbody.innerHTML = '';

            const f = filter.trim().toLowerCase();
            const visible = productos.filter(p => !f || p.nombre.toLowerCase().includes(f));

            if (visible.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #999;">Sin productos</td></tr>';
                return;
            }

            visible.forEach(p => {
                tbody.innerHTML += `
                    <tr>
                        <td>${p.nombre}</td>
                        <td>$${p.precio.toFixed(2)}</td>
                        <td>${p.cantidad}</td>
                        <td>${p.descripcion}</td>
                        <td>
                            <button class="btn action-btn secondary" onclick="editarProducto(${p.id})">✏️</button>
                            <button class="btn action-btn danger" onclick="eliminarProducto(${p.id})">❌</button>
                        </td>
                    </tr>
                `;
            });
        }

        function editarProducto(id) {
            const p = productos.find(x => x.id === id);
            if (!p) return;
            document.getElementById('prodName').value = p.nombre;
            document.getElementById('prodPrice').value = p.precio;
            document.getElementById('prodQty').value = p.cantidad;
            document.getElementById('prodDesc').value = p.descripcion;
            productos = productos.filter(x => x.id !== id);
            document.getElementById('productFormContainer').style.display = 'block';
        }

        function eliminarProducto(id) {
            if (confirm('¿Eliminar producto?')) {
                productos = productos.filter(p => p.id !== id);
                renderizarProductos();
                guardarDatos();
            }
        }

        // ===== UTILIDADES =====
        function setFechaActual() {
            const hoy = new Date();
            const año = hoy.getFullYear();
            const mes = String(hoy.getMonth() + 1).padStart(2, '0');
            const dia = String(hoy.getDate()).padStart(2, '0');
            document.getElementById('fecha').value = `${año}-${mes}-${dia}`;
        }

        function editTitle() {
            editando = 'titulo';
            document.getElementById('editValue').value = titulo;
            document.getElementById('editModal').classList.add('active');
        }

        function guardarEdicion() {
            const valor = document.getElementById('editValue').value.trim();
            if (!valor) return alert('⚠️ Valor requerido');

            if (editando === 'titulo') {
                titulo = valor;
                document.querySelector('h1').textContent = titulo;
            }

            cerrarModal();
            guardarDatos();
        }

        function cerrarModal() {
            document.getElementById('editModal').classList.remove('active');
            editando = null;
        }

        function guardarDatos() {
            const datos = { titulo, transacciones, productos };
            localStorage.setItem('tiendaCompleta', JSON.stringify(datos));
            alert('✅ Datos guardados');
        }

        function cargarDatos() {
            const datos = localStorage.getItem('tiendaCompleta');
            if (datos) {
                const parsed = JSON.parse(datos);
                titulo = parsed.titulo || titulo;
                transacciones = parsed.transacciones || [];
                productos = parsed.productos || [];
                document.querySelector('h1').textContent = titulo;
            } else {
                // Datos de ejemplo
                transacciones = [
                    { fecha: "2026-03-01", monto: 100, tipo: "venta", descripcion: "Venta A" },
                    { fecha: "2026-04-01", monto: 150, tipo: "venta", descripcion: "Venta B" },
                    { fecha: "2026-04-05", monto: 50, tipo: "gasto", descripcion: "Compra" }
                ];
                productos = [
                    { id: 1, nombre: "Café", precio: 1.50, cantidad: 20, descripcion: "Café premium" },
                    { id: 2, nombre: "Pan", precio: 0.80, cantidad: 35, descripcion: "Pan fresco" }
                ];
            }
        }

        function exportarJSON() {
            const datos = { titulo, transacciones, productos };
            const json = JSON.stringify(datos, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tienda-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importarJSON() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput')?.addEventListener('change', (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const datos = JSON.parse(event.target.result);
                    titulo = datos.titulo || titulo;
                    transacciones = datos.transacciones || [];
                    productos = datos.productos || [];
                    document.querySelector('h1').textContent = titulo;
                    actualizarDashboard();
                    renderizarProductos();
                    renderizarTransacciones();
                    guardarDatos();
                    alert('✅ Datos importados');
                } catch (error) {
                    alert('❌ Error al importar');
                }
            };
            reader.readAsText(file);
        });

        function limpiarTodo() {
            if (confirm('⚠️ ¿Borrar TODO?')) {
                if (confirm('🚨 ¡ÚLTIMA ADVERTENCIA!')) {
                    localStorage.removeItem('tiendaCompleta');
                    titulo = "📊 Sistema Completo de Tienda";
                    transacciones = [];
                    productos = [];
                    document.querySelector('h1').textContent = titulo;
                    actualizarDashboard();
                    renderizarProductos();
                    renderizarTransacciones();
                    alert('🗑️ Todo eliminado');
                }
            }
        }

        // Buscar productos
        document.getElementById('searchProduct')?.addEventListener('input', (e) => {
            renderizarProductos(e.target.value);
        });

        // Enter en modales
        document.getElementById('editValue')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') guardarEdicion();
        });

        // Cerrar modal al hacer clic fuera
        document.getElementById('editModal')?.addEventListener('click', (e) => {
            if (e.target.id === 'editModal') cerrarModal();
        });
    </script>
</body>
</html>
